services:
  shopware:
    image: dockware/shopware:6.7.8.0
    container_name: shopware-ecf
    ports:
      - "8888:80"
    volumes:
      # Mount custom folder - hier komen je eigen themes en plugins
      - ./src/custom:/var/www/html/custom
    environment:
      - XDEBUG_ENABLED=0
      - PHP_VERSION=8.2
